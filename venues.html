<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bars & Venues</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU" crossorigin="anonymous">
 
<style>
.navbar-container {
  display: flex;
  justify-content: center;
  width: 100%;
}

.navbar a {
  color:white;
  padding:14px 16px;
  text-decoration:none;
}

a{
  color:white;
  text-decoration:none;
  margin:15px;
}

body {
  background: #0d1117;
  font-family: Arial, sans-serif;
  color: white;
  padding: 40px;
}

h1 { margin-bottom: 5px; }

.subtitle {
  color: #9ca3af;
  margin-bottom: 20px;
}

.search-container {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.search-container input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #1f2937;
  color: white;
}

button {
  padding: 12px 20px;
  border-radius: 10px;
  border: none;
  background: #7c3aed;
  color: white;
  cursor: pointer;
}

button:hover { opacity: 0.9; }

.venue {
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 15px;
}

.venue h3 { margin: 0; }

.venue p {
  margin: 5px 0;
  color: #cbd5e1;
}

.status {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
}

.open { background: #065f46; }
.closed { background: #374151; }

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal {
  background: #0f172a;
  padding: 30px;
  border-radius: 20px;
  width: 400px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.close-btn {
  cursor: pointer;
  font-size: 18px;
  opacity: 0.7;
}

.close-btn:hover { opacity: 1; }

.modal input {
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #1f2937;
  color: white;
}

.modal button {
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>Bars & Venues</h1>
<p class="subtitle">Get notified about closing times</p>

<div class="search-container">
  <input type="text" id="searchInput" placeholder="Search venues...">
  <button type="button" onclick="openModal()">+ Add Venue</button>
</div>

<div id="venueList"></div>

<!-- Modal -->
<div id="modalOverlay" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Add Venue</h2>
      <span class="close-btn" onclick="closeModal()">✕</span>
    </div>

    <input type="text" id="venueName" placeholder="Venue Name">
    <input type="text" id="venueAddress" placeholder="Address">

    <label>Opens</label>
    <input type="time" id="venueOpenTime">

    <label>Closes</label>
    <input type="time" id="venueCloseTime">

    <button type="button" onclick="saveVenue()">Add Venue</button>
  </div>
</div>

<script>
/* ================= ROTATING COLOR PALETTE ================= */
const gradients = [
  "linear-gradient(90deg, #134e4a, #0f172a)",
  "linear-gradient(90deg, #1e3a8a, #0f172a)",
  "linear-gradient(90deg, #4c1d95, #0f172a)",
  "linear-gradient(90deg, #7c2d12, #0f172a)",
  "linear-gradient(90deg, #065f46, #0f172a)"
];

let gradientIndex = 0;

/* ================= VENUES ================= */
let venues = [
  { name: "Deer Park", address: "108 W Main St", openTime: "11:30", closeTime: "01:00", gradient: gradients[0] },
  { name: "Klondike Kate's", address: "158 E Main St", openTime: "10:00", closeTime: "01:00", gradient: gradients[1] },
  { name: "Grotto's", address: "45 E Main St #100", openTime: "11:00", closeTime: "01:00", gradient: gradients[2] }
];

gradientIndex = venues.length;

/* Track what list is currently being shown (all vs filtered) */
let currentList = venues;

/* ================= OPEN/CLOSED LOGIC ================= */
function isOpenNow(openTime, closeTime) {
  const now = new Date();
  const currentMinutes = now.getHours() * 60 + now.getMinutes();

  const [openH, openM] = openTime.split(":").map(Number);
  const [closeH, closeM] = closeTime.split(":").map(Number);

  const openMinutes = openH * 60 + openM;
  const closeMinutes = closeH * 60 + closeM;

  // handles venues that close after midnight (e.g., 01:00)
  if (closeMinutes < openMinutes) {
    return currentMinutes >= openMinutes || currentMinutes <= closeMinutes;
  }
  return currentMinutes >= openMinutes && currentMinutes <= closeMinutes;
}

/* ================= RENDER ================= */
function renderVenues(list) {
  currentList = list; // remember current view
  const venueList = document.getElementById("venueList");
  venueList.innerHTML = "";

  list.forEach(venue => {
    const open = isOpenNow(venue.openTime, venue.closeTime);

    const div = document.createElement("div");
    div.className = "venue";
    div.style.background = venue.gradient;

    div.innerHTML = `
      <h3>${venue.name}</h3>
      <p>${venue.address}</p>
      <p>${venue.openTime} – ${venue.closeTime}
        <span class="status ${open ? "open" : "closed"}">
          ${open ? "Open" : "Closed"}
        </span>
      </p>
    `;

    venueList.appendChild(div);
  });
}

/* Re-render on an interval so Open/Closed updates with time */
function startStatusUpdater() {
  // update once per minute (you can change to 30_000 for every 30 seconds)
  setInterval(() => {
    renderVenues(currentList);
  }, 60_000);
}

/* ================= MODAL FUNCTIONS ================= */
function openModal() {
  document.getElementById("modalOverlay").style.display = "flex";
}

function closeModal() {
  document.getElementById("modalOverlay").style.display = "none";
}

function saveVenue() {
  const name = document.getElementById("venueName").value;
  const address = document.getElementById("venueAddress").value;
  const openTime = document.getElementById("venueOpenTime").value;
  const closeTime = document.getElementById("venueCloseTime").value;

  if (!name || !address || !openTime || !closeTime) {
    alert("Please fill in all fields.");
    return;
  }

  venues.push({
    name,
    address,
    openTime,
    closeTime,
    gradient: gradients[gradientIndex % gradients.length]
  });

  gradientIndex++;

  // After adding, show the full list again (or you can preserve filtering if you want)
  renderVenues(venues);
  closeModal();

  document.getElementById("venueName").value = "";
  document.getElementById("venueAddress").value = "";
  document.getElementById("venueOpenTime").value = "";
  document.getElementById("venueCloseTime").value = "";
}

/* ================= SEARCH ================= */
document.getElementById("searchInput").addEventListener("input", function() {
  const searchValue = this.value.toLowerCase();
  const filtered = venues.filter(v => v.name.toLowerCase().includes(searchValue));
  renderVenues(filtered);
});

/* Initial render + start syncing */
renderVenues(venues);
startStatusUpdater();
</script>

<div class="fixed-bottom navbar-container">
  <!-- your navbar links/icons... -->
</div>

</body>
</html>
