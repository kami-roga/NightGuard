<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Routes</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU" crossorigin="anonymous">

  <style>

.navbar-container {
    display: flex;
    justify-content: center;
    width: 100%;
}

.navbar a {
    color:white;
    padding:14px 16px;
    text-decoration:none;
}

a{
    color:white;
    text-decoration:none;
    margin:15px;
}
    body{
      margin:0;
      padding:40px 18px 60px;
      background:#0d1117;
      color:#fff;
      font-family: Arial, sans-serif;
    }
    .app{max-width:1100px;margin:0 auto;}
    .panel{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:flex-end;
      margin: 18px 0;
    }
    .field{
      flex:1;
      min-width:220px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    label{color:#cbd5e1;font-size:13px;}
    input{
      padding:12px;
      border-radius:10px;
      border:none;
      outline:none;
      background:#1f2937;
      color:#fff;
      font-size:15px;
    }
    button{
      padding:12px 20px;
      border-radius:10px;
      border:none;
      background:#7c3aed;
      color:#fff;
      font-weight:700;
      cursor:pointer;
    }
    button:hover{opacity:.92}
    .secondary{background:#334155;font-weight:600;}

    .mapWrap{
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background:#0b1220;
    }
    img{display:block;width:100%;height:auto;}
  </style>
</head>
<body>
  <div class="app">
    <h1>Routes</h1>

    <form id="routeForm" class="panel">
      <div class="field">
        <label for="start">Start location</label>
        <input id="start" name="start" placeholder="Enter start..." />
      </div>

      <div class="field">
        <label for="dest">Destination</label>
        <input id="dest" name="dest" placeholder="Enter destination..." />
      </div>

      <button type="submit">Go</button>
      <button type="button" id="resetBtn" class="secondary">Reset</button>
    </form>

    <div class="mapWrap">
      <img id="mapImage" src="images/blank_map.png" alt="Map" />
    </div>
  </div>

  <script>
    const BLANK_SRC = "images/blank_map.png";
    const ROUTES_SRC = "images/routes_map.png";

    const form = document.getElementById("routeForm");
    const mapImage = document.getElementById("mapImage");
    const resetBtn = document.getElementById("resetBtn");

    // Ensure the blank map is shown on load
    mapImage.src = BLANK_SRC;

    // Clicking "Go" swaps to the routes map
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      mapImage.src = ROUTES_SRC;
    });

    // Reset back to blank
    resetBtn.addEventListener("click", () => {
      form.reset();
      mapImage.src = BLANK_SRC;
    });
  </script>
</body>
</html>
