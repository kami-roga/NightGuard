<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Routes</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU" crossorigin="anonymous">

  <style>
    body{
      margin:0;
      padding:40px 18px 140px; /* space for bottom navbar */
      background:#070424;
      color:#fff;
      font-family: Arial, sans-serif;
    }
    .app{max-width:1100px;margin:0 auto;}

    .panel{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:flex-end;
      margin: 18px 0;
    }
    .field{
      flex:1;
      min-width:220px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    label{color:#cbd5e1;font-size:13px;}
    input{
      padding:12px;
      border-radius:10px;
      border:none;
      outline:none;
      background:#1f2937;
      color:#fff;
      font-size:15px;
    }
    button{
      padding:12px 20px;
      border-radius:10px;
      border:none;
      background:#7c3aed;
      color:#fff;
      font-weight:700;
      cursor:pointer;
    }
    button:hover{opacity:.92}
    .secondary{background:#334155;font-weight:600;}

    .mapWrap{
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background:#0b1220;
    }
    img{display:block;width:100%;height:auto;}

    /* --- Recommended routes section --- */
    .sectionHeader{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin: 22px 0 12px;
    }
    .sectionHeader h2{
      font-size:22px;
      margin:0;
      font-weight:800;
    }
    .viewAll{
      color:#a78bfa;
      text-decoration:none;
      font-weight:700;
    }
    .routesList{
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    .routeCard{
      display:flex;
      gap:16px;
      align-items:center;
      padding:18px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.10);
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
    }

    .score{
      width:64px;
      height:64px;
      border-radius:999px;
      display:grid;
      place-items:center;
      font-size:22px;
      font-weight:900;
      border:3px solid rgba(16,185,129,.35);
      color:#34d399;
      flex: 0 0 auto;
      background: rgba(16,185,129,.08);
    }
    .score.mid{
      border-color: rgba(245,158,11,.35);
      color:#fbbf24;
      background: rgba(245,158,11,.08);
    }
    .score.low{
      border-color: rgba(239,68,68,.35);
      color:#fca5a5;
      background: rgba(239,68,68,.08);
    }

    .routeMain{flex:1;}
    .routeTitle{margin:0 0 6px; font-size:22px; font-weight:850;}
    .routeSubtitle{margin:0 0 10px; color:#94a3b8; font-size:16px;}

    .pillRow{display:flex; flex-wrap:wrap; gap:10px; align-items:center; color:#94a3b8;}
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 12px;
      border-radius:999px;
      font-weight:800;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
    }
    .pill.good{ color:#34d399; background: rgba(16,185,129,.10); border-color: rgba(16,185,129,.18); }
    .pill.warn{ color:#fbbf24; background: rgba(245,158,11,.10); border-color: rgba(245,158,11,.18); }

    .meta{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-left: 6px;
    }

    /* hide until Go */
    #recommendedSection{ display:none; }

    /* bottom navbar (same style as your other pages) */
    .navbar-container {
      display: flex;
      justify-content: center;
      width: 100%;
      background:#0b1220;
      border-top:1px solid rgba(255,255,255,.08);
      padding: 10px 0;
    }
    a{ color:white; text-decoration:none; margin:15px; }
  </style>
</head>

<body>
  <div class="app">
    <h1 style="margin:0 0 6px;">Safe Routes</h1>
    <p style="color:#9ca3af;margin:0 0 18px;">Enter a start and destination, then press Go.</p>

    <form id="routeForm" class="panel">
      <div class="field">
        <label for="start">Start location</label>
        <input id="start" name="start" placeholder="Enter start..." />
      </div>

      <div class="field">
        <label for="dest">Destination</label>
        <input id="dest" name="dest" placeholder="Enter destination..." />
      </div>

      <button type="submit">Go</button>
      <button type="button" id="resetBtn" class="secondary">Reset</button>
    </form>

    <div class="mapWrap">
      <img id="mapImage" src="images/blank_map.png" alt="Map" />
    </div>

    <!-- Recommended routes (hidden until Go) -->
    <section id="recommendedSection">
      <div class="sectionHeader">
        <h2>Recommended Routes</h2>
        <a class="viewAll" href="#" onclick="event.preventDefault()">View all ›</a>
      </div>

      <div id="routesList" class="routesList"></div>
    </section>
  </div>

  <script>
    const BLANK_SRC = "images/blank_map.png";
    const ROUTES_SRC = "images/colored_map.png";

    const form = document.getElementById("routeForm");
    const mapImage = document.getElementById("mapImage");
    const resetBtn = document.getElementById("resetBtn");

    const recommendedSection = document.getElementById("recommendedSection");
    const routesListEl = document.getElementById("routesList");

    // Data matching your screenshot; distance is in miles.
    const SAMPLE_ROUTES = [
      {
        score: 92,
        name: "via The Green/The GRN and E Main St",
        fromTo: "Start → Destination",
        lighting: "Well Lit",
        crime: "Low Crime",
        durationMin: 13,
        distanceMiles: 0.6
      },
      {
        score: 85,
        name: "via E Delaware Ave and E Main St",
        fromTo: "Start → Destination",
        lighting: "Well Lit",
        crime: "Low Crime",
        durationMin: 13,
        distanceMiles: 0.6
      },
      {
        score: 75,
        name: "via S College Ave and E Main St",
        fromTo: "Start → Destination",
        lighting: "Moderate",
        crime: "Moderate",
        durationMin: 14,
        distanceMiles: 0.6
      }
    ];

    function scoreClass(score){
      if (score >= 80) return "";
      if (score >= 60) return "mid";
      return "low";
    }

    function pillClass(label){
      const v = String(label).toLowerCase();
      if (v.includes("low") || v.includes("well")) return "good";
      return "warn";
    }

    function renderRecommendedRoutes(routes){
      routesListEl.innerHTML = "";

      routes.forEach(r => {
        const card = document.createElement("div");
        card.className = "routeCard";

        card.innerHTML = `
          <div class="score ${scoreClass(r.score)}">${r.score}</div>
          <div class="routeMain">
            <div class="routeTitle">${r.name}</div>
            <div class="routeSubtitle"><i class="fa-solid fa-location-dot"></i> ${r.fromTo}</div>

            <div class="pillRow">
              <span class="pill ${pillClass(r.lighting)}"><i class="fa-solid fa-sun"></i> ${r.lighting}</span>
              <span class="pill ${pillClass(r.crime)}"><i class="fa-solid fa-shield"></i> ${r.crime}</span>

              <span class="meta"><i class="fa-regular fa-clock"></i> ${r.durationMin} min</span>
              <span class="meta"><i class="fa-solid fa-route"></i> ${r.distanceMiles} mi</span>
            </div>
          </div>
        `;

        routesListEl.appendChild(card);
      });
    }

    // initial state
    mapImage.src = BLANK_SRC;

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const start = (document.getElementById("start").value || "Start").trim();
      const dest = (document.getElementById("dest").value || "Destination").trim();
      const fromTo = `${start} → ${dest}`;

      // 1) swap the map
      mapImage.src = ROUTES_SRC;

      // 2) show + render recommended routes (with from/to filled in)
      recommendedSection.style.display = "block";
      renderRecommendedRoutes(SAMPLE_ROUTES.map(r => ({ ...r, fromTo })));
    });

    resetBtn.addEventListener("click", () => {
      form.reset();
      mapImage.src = BLANK_SRC;
      recommendedSection.style.display = "none";
      routesListEl.innerHTML = "";
    });
  </script>
