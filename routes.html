<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Routes</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU" crossorigin="anonymous">

  <style>
    .navbar-container {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .navbar a {
      color:white;
      padding:14px 16px;
      text-decoration:none;
    }

    a{
      color:white;
      text-decoration:none;
      margin:15px;
    }

    body{
      margin:0;
      /* add bottom padding so the fixed-bottom nav doesn't cover content */
      padding:40px 18px 120px;
      background:#0d1117;
      color:#fff;
      font-family: Arial, sans-serif;
    }

    .app{max-width:1100px;margin:0 auto;}

    .panel{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:flex-end;
      margin: 18px 0;
    }

    .field{
      flex:1;
      min-width:220px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    label{color:#cbd5e1;font-size:13px;}

    input{
      padding:12px;
      border-radius:10px;
      border:none;
      outline:none;
      background:#1f2937;
      color:#fff;
      font-size:15px;
    }

    button{
      padding:12px 20px;
      border-radius:10px;
      border:none;
      background:#7c3aed;
      color:#fff;
      font-weight:700;
      cursor:pointer;
    }

    button:hover{opacity:.92}

    .secondary{background:#334155;font-weight:600;}

    .mapWrap{
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background:#0b1220;
    }

    img{display:block;width:100%;height:auto;}
  </style>
</head>

<body>
  <div class="app">
    <h1 style="margin:0 0 6px;">Routes</h1>
    <p style="color:#9ca3af;margin:0 0 18px;">Enter a start and destination, then press Go.</p>

    <form id="routeForm" class="panel">
      <div class="field">
        <label for="start">Start location</label>
        <input id="start" name="start" placeholder="Enter start..." />
      </div>

      <div class="field">
        <label for="dest">Destination</label>
        <input id="dest" name="dest" placeholder="Enter destination..." />
      </div>

      <button type="submit">Go</button>
      <button type="button" id="resetBtn" class="secondary">Reset</button>
    </form>

    <div class="mapWrap">
      <img id="mapImage" src="images/blank_map.png" alt="Map" />
    </div>
  </div>

  <script>
    const BLANK_SRC = "images/blank_map.png";
    const ROUTES_SRC = "images/routes_map.png";

    const form = document.getElementById("routeForm");
    const mapImage = document.getElementById("mapImage");
    const resetBtn = document.getElementById("resetBtn");

    // Ensure the blank map is shown on load
    mapImage.src = BLANK_SRC;

    // Clicking "Go" swaps to the routes map
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      mapImage.src = ROUTES_SRC;
    });

    // Reset back to blank
    resetBtn.addEventListener("click", () => {
      form.reset();
      mapImage.src = BLANK_SRC;
    });
  </script>

  <!-- Bottom navbar copied from main.html -->
  <div class="fixed-bottom navbar-container">
    <a href="main.html">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-house-door-fill" viewBox="0 0 16 16">
        <path d="M6.5 14.5v-3.505c0-.245.25-.495.5-.495h2c.25 0 .5.25.5.5v3.5a.5.5 0 0 0 .5.5h4a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.146-.354L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.354 1.146a.5.5 0 0 0-.708 0l-6 6A.5.5 0 0 0 1.5 7.5v7a.5.5 0 0 0 .5.5h4a.5.5 0 0 0 .5-.5"/>
      </svg>
      Home
    </a>

    <a href="friends.html">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-people-fill" viewBox="0 0 16 16">
        <path d="M7 14s-1 0-1-1 1-4 5-4 5 3 5 4-1 1-1 1zm4-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6m-5.784 6A2.24 2.24 0 0 1 5 13c0-1.355.68-2.75 1.936-3.72A6.3 6.3 0 0 0 5 9c-4 0-5 3-5 4s1 1 1 1zM4.5 8a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5"/>
      </svg>
      Friends
    </a>

    <a href="map.html">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-map-fill" viewBox="0 0 16 16">
        <path fill-rule="evenodd" d="M16 .5a.5.5 0 0 0-.598-.49L10.5.99 5.598.01a.5.5 0 0 0-.196 0l-5 1A.5.5 0 0 0 0 1.5v14a.5.5 0 0 0 .598.49l4.902-.98 4.902.98a.5.5 0 0 0 .196 0l5-1A.5.5 0 0 0 16 14.5zM5 14.09V1.11l.5-.1.5.1v12.98l-.402-.08a.5.5 0 0 0-.196 0zm5 .8V1.91l.402.08a.5.5 0 0 0 .196 0L11 1.91v12.98l-.5.1z"/>
      </svg>
      Map
    </a>
  </div>
</body>
</html>
